global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'inktrust-api'
    static_configs:
      - targets: ['api-server:3001']

  - job_name: 'inktrust-workers'
    static_configs:
      - targets: ['api-server:3001'] # Workers often expose metrics on the same port

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres:5432']
