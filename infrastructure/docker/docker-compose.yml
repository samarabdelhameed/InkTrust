version: '3.8'

x-restart: &restart
  restart: unless-stopped

x-healthcheck-postgres: &healthcheck-postgres
  test: ['CMD-SHELL', 'pg_isready -U user -d inktrust_db']
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

x-healthcheck-redis: &healthcheck-redis
  test: ['CMD', 'redis-cli', 'ping']
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

services:
  postgres:
    image: postgres:15-alpine
    container_name: inktrust_postgres
    <<: *restart
    healthcheck: *healthcheck-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-inktrust_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inktrust_net

  redis:
    image: redis:7-alpine
    container_name: inktrust_redis
    <<: *restart
    healthcheck: *healthcheck-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1
    networks:
      - inktrust_net

  minio:
    image: minio/minio:latest
    container_name: inktrust_minio
    <<: *restart
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - inktrust_net

  prometheus:
    image: prom/prometheus:latest
    container_name: inktrust_prometheus
    <<: *restart
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - inktrust_net

  grafana:
    image: grafana/grafana:latest
    container_name: inktrust_grafana
    <<: *restart
    ports:
      - '${GRAFANA_PORT:-3000}:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - inktrust_net

networks:
  inktrust_net:
    name: inktrust_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    name: inktrust_postgres_data
  redis_data:
    name: inktrust_redis_data
  minio_data:
    name: inktrust_minio_data
  prometheus_data:
    name: inktrust_prometheus_data
  grafana_data:
    name: inktrust_grafana_data
