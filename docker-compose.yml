services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inktrust
      POSTGRES_PASSWORD: inktrust_dev
      POSTGRES_DB: inktrust_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inktrust"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: inktrust_admin
      MINIO_ROOT_PASSWORD: inktrust_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 inktrust_admin inktrust_secret &&
      mc mb local/inktrust-assets --ignore-existing &&
      mc policy set public local/inktrust-assets &&
      echo 'Bucket created successfully'
      "

volumes:
  pgdata:
  miniodata:
